name: package

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Prepare Technitium SDK refs
        run: sh scripts/prepare-sdk.sh 14.3.0

      - name: Package app
        run: sh scripts/package-app.sh

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: RemoteRewriteApp
          path: |
            dist/RemoteRewriteApp.zip
            dist/RemoteRewriteApp/**
